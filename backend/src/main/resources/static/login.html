<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login JWT</title>
    <style>
      body {
        font-family: Arial;
        max-width: 400px;
        margin: 80px auto;
      }
      input,
      button {
        width: 100%;
        padding: 8px;
        margin: 6px 0;
      }
      #msg {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>Login v1.0</h2>

    <ul>
      <li><a href="hello.html">Helloo</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
    <input id="username" placeholder="Usuari" />
    <input id="password" placeholder="Password" />
    <button onclick="login()">Entrar</button>

    <div id="msg"></div>

    <script>
      async function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: username,
            password: password,
          }),
        });

        const data = await res.json();

        if (data.token) {
          localStorage.setItem("jwt", data.token);
          document.getElementById("msg").innerText =
            "Login correcto. Token guardado (primeros 25): " +
            data.token.substring(0, 25) +
            "...";
        } else {
          document.getElementById("msg").innerText =
            "Error de login. Respuesta: " + JSON.stringify(data);
        }
      }
    </script>
  </body>
</html>
