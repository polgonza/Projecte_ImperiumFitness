<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Imperium Fitness</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <img src="assets/logo.png" alt="Imperium">
        <span class="text-gold">IMPERIUM</span>
      </div>

      <h2>Bienvenido</h2>
      <p class="subtitle">Accede a tu cuenta para reservar y comprar</p>

      <!-- Mensaje de error/éxito -->
      <div id="login-alert" class="alert"></div>

      <!-- Botones de login social (demo, no funcional) -->
      <div class="social-btns">
        <button class="btn-social" onclick="showToast('Login social (Demo) 🔑', 'success')">
          <!-- SVG Google -->
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuar con Google
        </button>
        <button class="btn-social" onclick="showToast('Login social (Demo) 🍎', 'success')">
          🍎 Continuar con Apple
        </button>
      </div>

      <div class="or-divider">o con email</div>

      <!-- Formulario de login -->
      <form id="login-form">
        <div class="field-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="input-field" placeholder="tu@email.com" required>
        </div>

        <div class="field-group">
          <label for="login-password">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" class="input-field" placeholder="••••••••" required>
            <button type="button" class="toggle-password" data-target="login-password">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.85rem;margin-top:0.5rem">
          Entrar
        </button>
      </form>

      <!-- Links -->
      <div class="auth-links" style="margin-top:1rem">
        <a href="recover.html">¿Olvidaste tu contraseña?</a>
      </div>
      <div class="auth-links">
        ¿No tienes cuenta? <a href="register.html">Regístrate</a>
      </div>
      <div class="auth-links">
        <a href="index.html">← Volver al inicio</a>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/carrito.js"></script>
</body>
</html>
