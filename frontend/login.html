<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Imperium Fitness</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <img src="assets/logo.png" alt="Imperium">
        <span class="text-gold">IMPERIUM</span>
      </div>

      <h2>Bienvenido</h2>
      <p class="subtitle">Accede a tu cuenta para reservar y comprar</p>

      <!-- Mensaje de error/éxito -->
      <div id="login-alert" class="alert"></div>

      <!-- Formulario de login -->
      <form id="login-form">
        <div class="field-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="input-field" placeholder="tu@email.com" required>
        </div>

        <div class="field-group">
          <label for="login-password">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" class="input-field" placeholder="••••••••" required>
            <button type="button" class="toggle-password" data-target="login-password">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary"
          style="width:100%;justify-content:center;padding:0.85rem;margin-top:0.5rem">
          Entrar
        </button>
      </form>

      <!-- Links -->
      <div class="auth-links" style="margin-top:1rem">
        <a href="recover.html">¿Olvidaste tu contraseña?</a>
      </div>
      <div class="auth-links">
        ¿No tienes cuenta? <a href="register.html">Regístrate</a>
      </div>
      <div class="auth-links">
        <a href="index.html">← Volver al inicio</a>
      </div>

    </div>
  </div>

  <!-- ORDRE IMPORTANT: api.js sempre PRIMER -->
  <script src="js/api.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
  <script src="js/carrito.js"></script>

  <script>
    // Mostra el missatge de sessió expirada si existeix
    document.addEventListener("DOMContentLoaded", function () {
      const msg = sessionStorage.getItem("session_msg");
      if (msg) {
        const alertEl = document.getElementById("login-alert");
        if (alertEl) {
          alertEl.textContent = msg;
          alertEl.className = "alert error show";
        }
        sessionStorage.removeItem("session_msg");
      }
    });
  </script>
</body>

</html>
